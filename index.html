<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Bowls Scorer</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --green: #1b5e20; --blue: #0d47a1; --red: #b71c1c; --gold: #fbc02d; --white: #ffffff; --light: #f4f4f4; }
        body { font-family: -apple-system, sans-serif; background: #222; margin: 0; padding: 0; color: #333; }
        .container { background: var(--light); max-width: 450px; min-height: 100vh; margin: auto; padding: 15px; box-sizing: border-box; }
        
        .card { background: var(--white); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { color: var(--green); text-align: center; margin-top: 0; font-size: 1.4rem; border-bottom: 2px solid var(--green); padding-bottom: 10px; }
        
        label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #666; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .club-input { background: #fffde7; border: 1px solid var(--gold); font-weight: bold; }

        .board { display: flex; justify-content: space-around; align-items: center; background: var(--white); padding: 15px; border-radius: 10px; border-bottom: 5px solid #ddd; }
        .score-box { text-align: center; width: 40%; }
        .score-num { font-size: 3.5rem; font-weight: 900; color: var(--green); margin: 0; }
        .team-name { font-size: 0.85rem; font-weight: bold; line-height: 1.2; height: 2.4em; display: flex; align-items: center; justify-content: center; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-a { background: var(--blue); }
        .btn-b { background: var(--red); }
        .btn-dead { background: #607d8b; grid-column: span 2; padding: 10px; font-size: 0.8rem; }
        .btn-lock { background: var(--green); width: 100%; margin-top: 20px; box-shadow: 0 4px #0a2d10; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; text-align: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: #f5f5f5; border: 1px solid #ddd; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; border-radius: 8px; overflow: hidden; font-size: 0.9rem; }
        th { background: #444; color: white; padding: 10px; font-size: 0.75rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; }
        .row-dead { background: #fff3e0; color: #e65100; font-style: italic; }

        .sig-container { background: white; border: 1px solid #ccc; border-radius: 5px; height: 100px; width: 100%; touch-action: none; }
    </style>
</head>
<body>

<div class="container" id="app-canvas">
    
    <div id="view-setup">
        <div class="card">
            <h2>Match Setup</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>Green</label>
                    <select id="in-green">
                        <option value="A">Green A</option>
                        <option value="B">Green B</option>
                        <option value="C">Green C</option>
                    </select>
                </div>
                <div>
                    <label>Rink</label>
                    <input type="number" id="in-rink" placeholder="Rink #">
                </div>
            </div>
            
            <label>Game Format</label>
            <select id="in-format" onchange="updatePlayerInputs()">
                <option value="1">Singles</option>
                <option value="2">Pairs</option>
                <option value="3-2">2 Bowl Trips</option>
                <option value="3-3">3 Bowl Trips</option>
                <option value="4" selected>Fours</option>
            </select>

            <label>Win Condition</label>
            <select id="in-mode" onchange="toggleModeSelect()">
                <option value="ends">Fixed Ends</option>
                <option value="points">First to 21 Points</option>
            </select>

            <div id="ends-select-wrap">
                <label>Number of Ends</label>
                <select id="in-target-ends">
                    <option value="10" selected>10 Ends</option>
                    <option value="12">12 Ends</option>
                    <option value="15">15 Ends</option>
                    <option value="18">18 Ends</option>
                    <option value="21">21 Ends</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:15px;">
                <div>
                    <strong style="color:var(--blue)">TEAM A</strong>
                    <input type="text" id="in-clubA" class="club-input" placeholder="Club Name">
                    <div id="area-playersA"></div>
                </div>
                <div>
                    <strong style="color:var(--red)">TEAM B</strong>
                    <input type="text" id="in-clubB" class="club-input" placeholder="Club Name">
                    <div id="area-playersB"></div>
                </div>
            </div>
            
            <button class="btn btn-lock" onclick="startMatch()">Start Scoring</button>
        </div>
    </div>

    <div id="view-match" style="display:none;">
        <div id="meta-info" style="text-align:center; font-size:0.7rem; color:#666; margin-bottom:8px; font-weight:bold;"></div>
        
        <div class="board">
            <div class="score-box">
                <div class="team-name" id="label-A">TEAM A</div>
                <p class="score-num" id="pts-A">0</p>
            </div>
            <div style="font-weight:bold; color:#bbb;">VS</div>
            <div class="score-box">
                <div class="team-name" id="label-B">TEAM B</div>
                <p class="score-num" id="pts-B">0</p>
            </div>
        </div>

        <div id="status-text" style="text-align:center; margin-top:12px; font-weight:bold; color:var(--green);">End 1</div>

        <div class="btn-row" id="scoring-controls">
            <button class="btn btn-a" onclick="showKeypad('A')">A Win</button>
            <button class="btn btn-b" onclick="showKeypad('B')">B Win</button>
            <button class="btn btn-dead" onclick="addDeadEnd()">Record Dead End</button>
        </div>

        <table id="score-table">
            <thead><tr><th>End</th><th>Team A</th><th>Team B</th></tr></thead>
            <tbody id="history-table"></tbody>
        </table>

        <div id="final-actions" style="display:none; margin-top:20px; border-top:2px dashed #ccc; padding-top:15px;">
            <div style="display:flex; gap:10px;">
                <div style="flex:1; text-align:center;"><small id="name-skipA" style="font-weight:bold; display:block; margin-bottom:5px;">Skip A</small><canvas id="pad-a" class="sig-container"></canvas></div>
                <div style="flex:1; text-align:center;"><small id="name-skipB" style="font-weight:bold; display:block; margin-bottom:5px;">Skip B</small><canvas id="pad-b" class="sig-container"></canvas></div>
            </div>
            <button class="btn btn-lock" style="background:var(--green); margin-top:20px;" onclick="shareResult()">Share Scorecard</button>
            <button class="btn" style="background:#555; width:100%; margin-top:10px;" onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<div id="modal-keypad" class="modal">
    <div class="modal-content">
        <h3 id="keypad-title">Shots for A</h3>
        <div class="keypad" id="keypad-grid"></div>
        <button onclick="hideKeypad()" style="margin-top:20px; width:100%; padding:12px; border:none; background:#ddd;">Cancel</button>
    </div>
</div>

<script>
    let match = { scoreA: 0, scoreB: 0, currentEnd: 1, history: [], mode: 'ends', target: 21 };
    let sigA, sigB;

    function toggleModeSelect() {
        const mode = document.getElementById('in-mode').value;
        document.getElementById('ends-select-wrap').style.display = (mode === 'points') ? 'none' : 'block';
    }

    function updatePlayerInputs() {
        const fmt = document.getElementById('in-format').value;
        const count = fmt.includes('-') ? parseInt(fmt.split('-')[0]) : parseInt(fmt);
        const roles = ["Lead", "Second", "Third", "Skip"];
        const areaA = document.getElementById('area-playersA');
        const areaB = document.getElementById('area-playersB');
        areaA.innerHTML = ""; areaB.innerHTML = "";
        for (let i = 0; i < count; i++) {
            const label = (count === 1) ? "Player" : roles[i === count-1 ? 3 : i];
            areaA.innerHTML += `<input type="text" class="p-name-a" placeholder="${label}">`;
            areaB.innerHTML += `<input type="text" class="p-name-b" placeholder="${label}">`;
        }
    }

    function startMatch() {
        document.getElementById('label-A').innerText = document.getElementById('in-clubA').value || "Team A";
        document.getElementById('label-B').innerText = document.getElementById('in-clubB').value || "Team B";
        match.mode = document.getElementById('in-mode').value;
        match.target = (match.mode === 'points') ? 21 : parseInt(document.getElementById('in-target-ends').value);
        
        const namesA = document.querySelectorAll('.p-name-a');
        const namesB = document.querySelectorAll('.p-name-b');
        document.getElementById('name-skipA').innerText = namesA[namesA.length-1].value || "Skip A";
        document.getElementById('name-skipB').innerText = namesB[namesB.length-1].value || "Skip B";

        document.getElementById('view-setup').style.display = 'none';
        document.getElementById('view-match').style.display = 'block';
        
        sigA = new SignaturePad(document.getElementById('pad-a'));
        sigB = new SignaturePad(document.getElementById('pad-b'));
        
        updateBoard();
    }

    function showKeypad(team) {
        match.activeWinner = team;
        document.getElementById('keypad-title').innerText = "Shots for " + (team === 'A' ? "Team A" : "Team B");
        const grid = document.getElementById('keypad-grid');
        grid.innerHTML = "";
        for (let i = 1; i <= 8; i++) {
            grid.innerHTML += `<button class="key" onclick="processScore(${i})">${i}</button>`;
        }
        document.getElementById('modal-keypad').style.display = 'flex';
    }

    function hideKeypad() { document.getElementById('modal-keypad').style.display = 'none'; }

    function processScore(shots) {
        match.history.push({ end: match.currentEnd++, a: match.activeWinner==='A'?shots:0, b: match.activeWinner==='B'?shots:0, dead: false });
        match.scoreA += match.activeWinner==='A'?shots:0;
        match.scoreB += match.activeWinner==='B'?shots:0;
        hideKeypad(); updateBoard();
    }

    function addDeadEnd() {
        match.history.push({ end: 'DEAD', a: 0, b: 0, dead: true });
        updateBoard();
    }

    function updateBoard() {
        document.getElementById('pts-A').innerText = match.scoreA;
        document.getElementById('pts-B').innerText = match.scoreB;
        let isGameOver = (match.mode === 'points') ? (match.scoreA >= 21 || match.scoreB >= 21) : (match.currentEnd > match.target);
        if (isGameOver) {
            document.getElementById('scoring-controls').style.display = 'none';
            document.getElementById('final-actions').style.display = 'block';
            document.getElementById('status-text').innerText = "🏆 MATCH COMPLETE";
        } else {
            document.getElementById('status-text').innerText = `End ${match.currentEnd}`;
        }
        const table = document.getElementById('history-table');
        table.innerHTML = "";
        [...match.history].reverse().forEach(row => {
            table.innerHTML += `<tr class="${row.dead?'row-dead':''}"><td>${row.end}</td><td>${row.a||'-'}</td><td>${row.b||'-'}</td></tr>`;
        });
    }

    async function shareResult() {
        const canvas = await html2canvas(document.getElementById('app-canvas'));
        canvas.toBlob(blob => {
            const file = new File([blob], "Bowls_Result.png", { type: "image/png" });
            if (navigator.share) navigator.share({ files: [file] });
        });
    }
    updatePlayerInputs();
</script>
</body>
</html>
