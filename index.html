<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Bowls Scorer</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --green: #1b5e20; --blue: #0d47a1; --red: #b71c1c; --light: #f4f4f4; }
        body { font-family: sans-serif; background: var(--green); margin: 0; padding: 10px; }
        .app-container { background: var(--light); max-width: 400px; margin: auto; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        input, select { padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 16px; }
        .club-input { background: #fff9c4; font-weight: bold; }
        
        .scoreboard { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 8px; margin: 10px 0; border-bottom: 4px solid #ddd; }
        .score-val { font-size: 3rem; font-weight: 900; color: var(--green); }
        .team-label { font-size: 0.8rem; text-align: center; width: 40%; font-weight: bold; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
        
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { background: #eee; border: 1px solid #ccc; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .main-btn { padding: 20px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 1.1rem; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        
        .sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; padding: 20px; box-sizing: border-box; }
        canvas { border: 1px solid #aaa; background: #fff; width: 100%; height: 80px; border-radius: 5px; touch-action: none; }
    </style>
</head>
<body>

<div class="app-container" id="snapshot-target">
    <h2 style="text-align:center; color:var(--green); margin-top:0;">Scorecard</h2>

    <div id="setup-section">
        <input type="text" id="green-name" placeholder="Green Name (e.g. Durban)">
        <input type="text" id="rink-num" placeholder="Rink Number">
        
        <label style="font-size: 0.7rem; font-weight: bold;">GAME FORMAT</label>
        <select id="game-format" onchange="adjustPlayerInputs()">
            <option value="1">Singles</option>
            <option value="2">Pairs</option>
            <option value="3-2">2 Bowl Trips</option>
            <option value="3-3">3 Bowl Trips</option>
            <option value="4" selected>Fours</option>
        </select>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <div>
                <strong>TEAM A</strong>
                <input type="text" id="clubA" class="club-input" placeholder="Club">
                <div id="playerFieldsA"></div>
            </div>
            <div>
                <strong>TEAM B</strong>
                <input type="text" id="clubB" class="club-input" placeholder="Club">
                <div id="playerFieldsB"></div>
            </div>
        </div>
        
        <button onclick="lockTeams()" style="width:100%; background:var(--green); color:white; padding:20px; border:none; border-radius:8px; font-weight:bold; margin-top:15px; font-size:1.1rem;">LOCK & START GAME</button>
    </div>

    <div id="game-section" style="display:none;">
        <div id="match-info" style="font-size:0.7rem; text-align:center; margin-bottom:10px; font-weight:bold; color:#555;"></div>
        
        <div class="scoreboard">
            <div id="display-labelA" class="team-label">TEAM A</div>
            <div class="score-val" id="totalA">0</div>
            <div style="font-weight:bold; color:#ccc;">VS</div>
            <div class="score-val" id="totalB">0</div>
            <div id="display-labelB" class="team-label">TEAM B</div>
        </div>

        <div id="match-status" style="text-align:center; font-weight:bold; margin-bottom:10px; color:var(--green);">End 1</div>

        <div class="btn-grid">
            <button class="main-btn" style="background:var(--blue);" onclick="openKeypad('A')">A WIN</button>
            <button class="main-btn" style="background:var(--red);" onclick="openKeypad('B')">B WIN</button>
            <button onclick="recordDead()" style="grid-column: span 2; padding:10px; background:#666; color:white; border:none; border-radius:5px;">DEAD END</button>
        </div>

        <table>
            <thead><tr><th>End</th><th>Team A</th><th>Team B</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
        
        <div id="sig-section" style="display:none; margin-top:20px; border-top:2px solid #ccc; padding-top:10px;">
            <div style="display:flex; gap:10px;">
                <div style="width:50%; text-align:center;"><small>Skip A</small><canvas id="sig-a" onclick="openSigModal('A')"></canvas></div>
                <div style="width:50%; text-align:center;"><small>Skip B</small><canvas id="sig-b" onclick="openSigModal('B')"></canvas></div>
            </div>
            <button onclick="takeImageSnapshot()" style="width:100%; background:var(--green); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-top:15px;">SHARE TO WHATSAPP</button>
        </div>
    </div>
</div>

<div id="shot-pop" class="overlay">
    <div class="card">
        <h3>Shots for Team <span id="winning-team-letter"></span></h3>
        <div id="keypad-area" class="keypad-grid"></div>
        <button onclick="document.getElementById('shot-pop').style.display='none'" style="margin-top:20px; width:100%; padding:10px;">Cancel</button>
    </div>
</div>

<div id="sig-modal" class="sig-modal">
    <h2 style="text-align:center;">Sign Here</h2>
    <canvas id="modal-canvas" style="height: 300px;"></canvas>
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="modalPad.clear()" style="flex:1; padding:20px; background:#f44336; color:white; border:none; border-radius:10px;">Clear</button>
        <button onclick="saveSig()" style="flex:1; padding:20px; background:var(--green); color:white; border:none; border-radius:10px;">Done</button>
    </div>
</div>

<script>
    let scoreA = 0, scoreB = 0, currentEnd = 1, history = [], winner = null, modalPad, activeSig;
    const labels = ["Lead", "Second", "Third", "Skip"];

    function adjustPlayerInputs() {
        const val = document.getElementById('game-format').value;
        const count = val.includes('-') ? parseInt(val.split('-')[0]) : parseInt(val);
        const containerA = document.getElementById('playerFieldsA'), containerB = document.getElementById('playerFieldsB');
        containerA.innerHTML = ""; containerB.innerHTML = "";
        
        for (let i = 0; i < count; i++) {
            let role = count === 1 ? "Player" : labels[i];
            containerA.innerHTML += `<input type="text" class="name-a" placeholder="${role}">`;
            containerB.innerHTML += `<input type="text" class="name-b" placeholder="${role}">`;
        }
    }

    function lockTeams() {
        const cA = document.getElementById('clubA').value || "Club A";
        const cB = document.getElementById('clubB').value || "Club B";
        const green = document.getElementById('green-name').value || "N/A";
        const rink = document.getElementById('rink-num').value || "N/A";
        
        document.getElementById('match-info').innerText = `${green} | Rink ${rink} | ${document.getElementById('game-format').selectedOptions[0].text}`;
        document.getElementById('display-labelA').innerText = cA;
        document.getElementById('display-labelB').innerText = cB;
        
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('game-section').style.display = 'block';
    }

    function openKeypad(team) {
        winner = team;
        document.getElementById('winning-team-letter').innerText = team;
        const format = document.getElementById('game-format').value;
        let max = (format === '3-2') ? 6 : (format === '3-3') ? 9 : 8;
        
        const area = document.getElementById('keypad-area');
        area.innerHTML = "";
        for (let i = 1; i <= max; i++) {
            area.innerHTML += `<button class="num-btn" onclick="addScore(${i})">${i}</button>`;
        }
        document.getElementById('shot-pop').style.display = 'flex';
    }

    function addScore(shots) {
        let sA = (winner === 'A') ? shots : 0;
        let sB = (winner === 'B') ? shots : 0;
        history.push({ end: currentEnd++, a: sA, b: sB });
        scoreA += sA; scoreB += sB;
        document.getElementById('shot-pop').style.display = 'none';
        updateUI();
    }

    function recordDead() {
        history.push({ end: 'DEAD', a: 0, b: 0 });
        updateUI();
    }

    function updateUI() {
        document.getElementById('totalA').innerText = scoreA;
        document.getElementById('totalB').innerText = scoreB;
        document.getElementById('match-status').innerText = "End " + currentEnd;
        
        const body = document.getElementById('card-body');
        body.innerHTML = "";
        [...history].reverse().forEach(e => {
            body.innerHTML += `<tr><td>${e.end}</td><td>${e.a || '-'}</td><td>${e.b || '-'}</td></tr>`;
        });

        if (currentEnd > 21) {
            document.getElementById('sig-section').style.display = 'block';
            document.getElementById('match-status').innerText = "GAME COMPLETE";
        }
    }

    function openSigModal(target) {
        activeSig = target;
        document.getElementById('sig-modal').style.display = 'flex';
        const canvas = document.getElementById('modal-canvas');
        canvas.width = canvas.offsetWidth; canvas.height = 300;
        if (!modalPad) modalPad = new SignaturePad(canvas);
        modalPad.clear();
    }

    function saveSig() {
        const data = modalPad.toDataURL();
        const targetCanvas = document.getElementById(activeSig === 'A' ? 'sig-a' : 'sig-b');
        const ctx = targetCanvas.getContext('2d');
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, targetCanvas.width, targetCanvas.height);
        img.src = data;
        document.getElementById('sig-modal').style.display = 'none';
    }

    async function takeImageSnapshot() {
        const canvas = await html2canvas(document.getElementById('snapshot-target'));
        canvas.toBlob(blob => {
            const file = new File([blob], "result.png", {type:"image/png"});
            if(navigator.share) navigator.share({files:[file]});
        });
    }

    // Initialize the first fields
    adjustPlayerInputs();
</script>
</body>
</html>
