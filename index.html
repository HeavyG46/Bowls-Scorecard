<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Bowls Scorer</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3233/3233481.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --green: #1b5e20; --blue: #0d47a1; --red: #b71c1c; --gold: #ffd700; --light: #f4f4f4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--green); color: #333; margin: 0; padding: 10px; }
        .app-container { background: var(--light); max-width: 500px; margin: auto; border-radius: 15px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-height: 90vh; }
        
        /* Header & Timer */
        .meta-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; font-weight: bold; }
        .timer-display { background: #333; color: var(--gold); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-family: monospace; }
        
        /* Setup Section */
        #setup-section { background: #e0e0e0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="text"] { width: 90%; padding: 5px; margin: 3px 0; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Scoreboard */
        .scoreboard { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 10px; border-bottom: 4px solid #ddd; }
        .score-val { font-size: 3rem; font-weight: 900; color: var(--green); margin: 0; }
        .team-label { font-size: 0.75rem; color: #666; text-transform: uppercase; font-weight: bold; }
        
        /* Controls */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-a { background: var(--blue); color: white; }
        .btn-b { background: var(--red); color: white; }
        .btn-undo { background: #777; color: white; grid-column: span 2; }
        
        /* Score Table */
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #eee; padding: 10px; font-size: 0.8rem; }
        td { border-bottom: 1px solid #f0f0f0; padding: 10px; text-align: center; font-weight: bold; }
        
        /* Signatures */
        #signature-section { display: none; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px; }
        canvas { border: 1px solid #bbb; background: #fff; width: 100%; height: 100px; border-radius: 5px; }
        .share-btn { background: #007bff; color: white; width: 100%; margin-top: 10px; }
        .pdf-btn { background: var(--green); color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="meta-header">
        <input type="date" id="match-date">
        <input type="time" id="match-time">
    </div>

    <div class="timer-display" id="timer-box">
        <div id="display-time" style="font-size: 1.5rem;">02:15:00</div>
        <button onclick="toggleTimer()" id="timer-btn" style="font-size: 0.7rem; padding: 4px 10px;">Start Clock</button>
    </div>

    <div id="setup-section">
        <div class="roster-grid">
            <div>
                <strong>Team A</strong><br>
                <input type="text" id="pA1" placeholder="Lead"><br>
                <input type="text" id="pA2" placeholder="Second"><br>
                <input type="text" id="pA3" placeholder="Third"><br>
                <input type="text" id="pA4" placeholder="Skip">
            </div>
            <div>
                <strong>Team B</strong><br>
                <input type="text" id="pB1" placeholder="Lead"><br>
                <input type="text" id="pB2" placeholder="Second"><br>
                <input type="text" id="pB3" placeholder="Third"><br>
                <input type="text" id="pB4" placeholder="Skip">
            </div>
        </div>
        <button onclick="lockTeams()" id="lock-btn" style="width:100%; margin-top:10px; background:#333; color:white;">Confirm Lineups</button>
    </div>

    <h2 id="match-status" style="text-align:center; color:var(--green); margin:10px 0;">End 1 of 21</h2>

    <div class="scoreboard">
        <div style="text-align:center;">
            <div class="team-label" id="labelA">Team A</div>
            <div class="score-val" id="totalA">0</div>
        </div>
        <div style="font-weight:bold; color:#ccc;">VS</div>
        <div style="text-align:center;">
            <div class="team-label" id="labelB">Team B</div>
            <div class="score-val" id="totalB">0</div>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-a" onclick="handleWin('A')">A Wins End</button>
        <button class="btn-b" onclick="handleWin('B')">B Wins End</button>
        <button class="btn-undo" onclick="undoLastEnd()">⟲ Undo Last End</button>
    </div>

    <table>
        <thead><tr><th>End</th><th>Team A</th><th>Team B</th></tr></thead>
        <tbody id="card-body"></tbody>
    </table>

    <div id="signature-section">
        <div class="roster-grid">
            <div style="text-align:center;"><small id="sig-labelA">Skip A Sign</small><canvas id="sig-a"></canvas></div>
            <div style="text-align:center;"><small id="sig-labelB">Skip B Sign</small><canvas id="sig-b"></canvas></div>
        </div>
        <button class="share-btn" onclick="shareResults()">📤 Share Result</button>
        <button class="pdf-btn" onclick="exportPDF()">📥 Download PDF Scorecard</button>
    </div>
</div>

<script>
    let scoreA = 0, scoreB = 0, currentEnd = 1, history = [], padA, padB;
    const maxEnds = 21;
    let timeLeft = 135 * 60, timerRunning = false, timerInterval;

    // Initialize Date/Time
    window.onload = () => {
        document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('match-time').value = new Date().toTimeString().substring(0,5);
    };

    function lockTeams() {
        const skipA = document.getElementById('pA4').value || "Team A";
        const skipB = document.getElementById('pB4').value || "Team B";
        document.getElementById('labelA').innerText = skipA;
        document.getElementById('labelB').innerText = skipB;
        document.getElementById('setup-section').style.display = 'none';
    }

    function handleWin(team) {
        if (currentEnd > maxEnds) return;
        let shots = parseInt(prompt(`Shots scored by Team ${team}? (1-8)`, "1"));
        if (isNaN(shots) || shots < 1 || shots > 8) return;

        history.push({ end: currentEnd, sA: (team==='A'?shots:0), sB: (team==='B'?shots:0) });
        if (team==='A') scoreA += shots; else scoreB += shots;
        currentEnd++;
        render();
    }

    function undoLastEnd() {
        if (history.length === 0) return;
        let last = history.pop();
        scoreA -= last.sA; scoreB -= last.sB; currentEnd--;
        render();
    }

    function render() {
        document.getElementById('totalA').innerText = scoreA;
        document.getElementById('totalB').innerText = scoreB;
        
        let diff = Math.abs(scoreA - scoreB);
        let possible = (maxEnds - (currentEnd - 1)) * 8;
        
        if ((diff > possible && currentEnd > 1) || currentEnd > maxEnds) {
            document.getElementById('match-status').innerHTML = "🏆 GAME COMPLETE";
            finishMatch();
        } else {
            document.getElementById('match-status').innerText = `End ${currentEnd} of ${maxEnds}`;
            document.getElementById('signature-section').style.display = 'none';
        }

        let html = "";
        [...history].reverse().forEach(e => {
            html += `<tr><td>${e.end}</td><td>${e.sA||'-'}</td><td>${e.sB||'-'}</td></tr>`;
        });
        document.getElementById('card-body').innerHTML = html;
    }

    function finishMatch() {
        document.getElementById('signature-section').style.display = 'block';
        if (!padA) {
            padA = new SignaturePad(document.getElementById('sig-a'));
            padB = new SignaturePad(document.getElementById('sig-b'));
            document.getElementById('sig-labelA').innerText = document.getElementById('labelA').innerText;
            document.getElementById('sig-labelB').innerText = document.getElementById('labelB').innerText;
        }
    }

    function toggleTimer() {
        if (!timerRunning) {
            timerInterval = setInterval(() => {
                timeLeft--;
                let h = Math.floor(timeLeft/3600), m = Math.floor((timeLeft%3600)/60), s = timeLeft%60;
                document.getElementById('display-time').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
            document.getElementById('timer-btn').innerText = "Pause";
        } else {
            clearInterval(timerInterval);
            document.getElementById('timer-btn').innerText = "Resume";
        }
        timerRunning = !timerRunning;
    }

    async function shareResults() {
        const text = `🎳 Bowls Result:\n${document.getElementById('labelA').innerText}: ${scoreA}\n${document.getElementById('labelB').innerText}: ${scoreB}\nEnds: ${currentEnd-1}`;
        if (navigator.share) await navigator.share({ title: 'Match Result', text: text });
        else alert("Shared to clipboard:\n" + text);
    }

    function exportPDF() {
        html2pdf().from(document.querySelector('.app-container')).save(`Scorecard_End_${currentEnd-1}.pdf`);
    }
</script>
</body>
</html>
