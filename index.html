<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Bowls Scorer - Club Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3233/3233481.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --green: #1b5e20; --blue: #0d47a1; --red: #b71c1c; --gold: #ffd700; --light: #f4f4f4; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--green); color: #333; margin: 0; padding: 10px; }
        .app-container { background: var(--light); max-width: 500px; margin: auto; border-radius: 15px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-height: 95vh; position: relative; }
        
        /* Overlays */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; color: white; text-align: center; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* Keypad Grid */
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .num-btn { background: #eee; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .num-btn:active { background: var(--green); color: white; }

        /* Setup & Roster */
        #setup-section { background: #e0e0e0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 92%; padding: 7px; margin: 3px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
        .club-input { background: #fff9c4; font-weight: bold; border: 1px solid var(--gold); }

        /* Scoreboard */
        .scoreboard { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 10px; border-bottom: 4px solid #ddd; }
        .score-val { font-size: 3rem; font-weight: 900; color: var(--green); margin: 0; }
        .team-label { font-size: 0.8rem; color: #444; text-align: center; flex: 1; }

        /* Main Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .main-btn { padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; color: white; }
        .btn-a { background: var(--blue); }
        .btn-b { background: var(--red); }
        .btn-undo { background: #777; grid-column: span 2; font-size: 0.8rem; padding: 10px; }

        /* Signatures */
        #signature-section { display: none; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px; }
        canvas { border: 1px solid #bbb; background: #fff; width: 100%; height: 100px; border-radius: 5px; touch-action: none; }
        .clear-sig { background: #f44336; color: white; font-size: 0.65rem; padding: 5px; margin-top: 5px; width: 90%; border-radius: 4px; border: none; }

        /* Table */
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th { background: #eee; padding: 8px; font-size: 0.7rem; }
        td { border-bottom: 1px solid #f0f0f0; padding: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="winner-pop" class="overlay">
    <div class="card">
        <h1 style="font-size: 3rem; margin:0;">🏆</h1>
        <h2 style="margin:5px 0;">CONGRATULATIONS</h2>
        <h1 id="winner-name" style="color: var(--green); margin: 10px 0;">WINNER</h1>
        <button onclick="document.getElementById('winner-pop').style.display='none'" style="background: var(--green); color: white; padding: 10px 20px; border:none; border-radius:5px;">Review Scorecard</button>
    </div>
</div>

<div id="shot-pop" class="overlay">
    <div class="card">
        <h3 id="shot-title" style="margin:0;">Select Shots</h3>
        <div class="keypad-grid">
            <button class="num-btn" onclick="submitShots(1)">1</button>
            <button class="num-btn" onclick="submitShots(2)">2</button>
            <button class="num-btn" onclick="submitShots(3)">3</button>
            <button class="num-btn" onclick="submitShots(4)">4</button>
            <button class="num-btn" onclick="submitShots(5)">5</button>
            <button class="num-btn" onclick="submitShots(6)">6</button>
            <button class="num-btn" onclick="submitShots(7)">7</button>
            <button class="num-btn" onclick="submitShots(8)">8</button>
            <button class="num-btn" onclick="closeShotPop()" style="background:#ccc; font-size:1rem;">X</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.75rem;">
        <input type="date" id="match-date" style="width:45%">
        <input type="time" id="match-time" style="width:45%">
    </div>

    <div style="background:#333; color:var(--gold); padding:8px; border-radius:8px; text-align:center; margin-bottom:15px; font-family:monospace;">
        <div id="display-time" style="font-size: 1.4rem;">02:15:00</div>
        <button onclick="toggleTimer()" id="timer-btn" style="background:#555; color:white; border:none; border-radius:4px; font-size:0.7rem; padding:3px 10px;">Start Clock</button>
    </div>

    <div id="setup-section">
        <div class="roster-grid">
            <div>
                <strong>TEAM A</strong>
                <input type="text" id="clubA" class="club-input" placeholder="Club Name">
                <input type="text" id="pA4" placeholder="Skip">
                <input type="text" id="pA3" placeholder="Third">
                <input type="text" id="pA2" placeholder="Second">
                <input type="text" id="pA1" placeholder="Lead">
            </div>
            <div>
                <strong>TEAM B</strong>
                <input type="text" id="clubB" class="club-input" placeholder="Club Name">
                <input type="text" id="pB4" placeholder="Skip">
                <input type="text" id="pB3" placeholder="Third">
                <input type="text" id="pB2" placeholder="Second">
                <input type="text" id="pB1" placeholder="Lead">
            </div>
        </div>
        <button onclick="lockTeams()" id="lock-btn" style="width:100%; margin-top:10px; background:#333; color:white; border:none; border-radius:5px; padding:10px;">Confirm Lineups</button>
    </div>

    <h2 id="match-status" style="text-align:center; color:var(--green); margin:10px 0;">End 1 of 21</h2>

    <div class="scoreboard">
        <div class="team-label" id="labelA">TEAM A</div>
        <div class="score-val" id="totalA">0</div>
        <div style="color:#ccc; font-weight:bold;">VS</div>
        <div class="score-val" id="totalB">0</div>
        <div class="team-label" id="labelB">TEAM B</div>
    </div>

    <div class="btn-grid">
        <button class="main-btn btn-a" onclick="handleWin('A')">A Wins End</button>
        <button class="main-btn btn-b" onclick="handleWin('B')">B Wins End</button>
        <button class="main-btn btn-undo" onclick="undoLastEnd()">⟲ Undo Last End</button>
    </div>

    <table>
        <thead><tr><th>End</th><th>Team A</th><th>Team B</th></tr></thead>
        <tbody id="card-body"></tbody>
    </table>

    <div id="signature-section">
        <div class="roster-grid">
            <div style="text-align:center;">
                <small id="sig-labelA" style="font-weight:bold;"></small><br>
                <canvas id="sig-a"></canvas>
                <button class="clear-sig" onclick="padA.clear()">↺ Redraw A</button>
            </div>
            <div style="text-align:center;">
                <small id="sig-labelB" style="font-weight:bold;"></small><br>
                <canvas id="sig-b"></canvas>
                <button class="clear-sig" onclick="padB.clear()">↺ Redraw B</button>
            </div>
        </div>
        <button onclick="sharePDF()" style="width:100%; margin-top:20px; background:#007bff; color:white; padding:15px; border:none; border-radius:8px; font-size:1.1rem; font-weight:bold;">📤 Share Official PDF</button>
        <button onclick="location.reload()" style="width:100%; margin-top:10px; background:#444; color:white; border:none; border-radius:5px; padding:8px; font-size:0.7rem;">♻️ New Match</button>
    </div>
</div>

<script>
    let scoreA = 0, scoreB = 0, currentEnd = 1, history = [], padA, padB, pendingWinner = null;
    const maxEnds = 21;
    let timeLeft = 135 * 60, timerRunning = false, timerInterval;

    window.onload = () => {
        document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('match-time').value = new Date().toTimeString().substring(0,5);
    };

    function lockTeams() {
        const cA = document.getElementById('clubA').value || "Club A";
        const cB = document.getElementById('clubB').value || "Club B";
        const sA = document.getElementById('pA4').value || "Skip A";
        const sB = document.getElementById('pB4').value || "Skip B";
        
        document.getElementById('labelA').innerHTML = `<strong>${cA}</strong><br><small>${sA}</small>`;
        document.getElementById('labelB').innerHTML = `<strong>${cB}</strong><br><small>${sB}</small>`;

        let rosterHTML = `<div class="roster-grid" style="font-size:0.75rem; background:white; padding:10px; border:1px solid #ddd; border-radius:5px;">
            <div><strong>${cA}</strong><br>S: ${sA}<br>3: ${document.getElementById('pA3').value}<br>2: ${document.getElementById('pA2').value}<br>L: ${document.getElementById('pA1').value}</div>
            <div><strong>${cB}</strong><br>S: ${sB}<br>3: ${document.getElementById('pB3').value}<br>2: ${document.getElementById('pB2').value}<br>L: ${document.getElementById('pB1').value}</div>
        </div>`;
        
        document.getElementById('setup-section').innerHTML = rosterHTML;
        document.getElementById('sig-labelA').innerText = cA + " Skip";
        document.getElementById('sig-labelB').innerText = cB + " Skip";
    }

    function handleWin(team) {
        if (currentEnd > maxEnds) return;
        pendingWinner = team;
        document.getElementById('shot-title').innerText = (team==='A'?document.getElementById('clubA').value:document.getElementById('clubB').value) || "Score:";
        document.getElementById('shot-pop').style.display = 'flex';
    }

    function submitShots(shots) {
        history.push({ end: currentEnd, sA: (pendingWinner === 'A' ? shots : 0), sB: (pendingWinner === 'B' ? shots : 0) });
        if (pendingWinner === 'A') scoreA += shots; else scoreB += shots;
        currentEnd++;
        closeShotPop();
        render();
    }

    function closeShotPop() { document.getElementById('shot-pop').style.display = 'none'; pendingWinner = null; }

    function undoLastEnd() {
        if (history.length === 0) return;
        let last = history.pop();
        scoreA -= last.sA; scoreB -= last.sB; currentEnd--;
        render();
    }

    function render() {
        document.getElementById('totalA').innerText = scoreA;
        document.getElementById('totalB').innerText = scoreB;
        let diff = Math.abs(scoreA - scoreB);
        let possible = (maxEnds - (currentEnd - 1)) * 8;

        if ((diff > possible && currentEnd > 1) || currentEnd > maxEnds) {
            document.getElementById('match-status').innerText = "🏆 GAME COMPLETE";
            document.getElementById('winner-name').innerText = scoreA > scoreB ? (document.getElementById('clubA').value || "TEAM A") : (document.getElementById('clubB').value || "TEAM B");
            document.getElementById('winner-pop').style.display = 'flex';
            finishMatch();
        } else { document.getElementById('match-status').innerText = `End ${currentEnd} of ${maxEnds}`; }

        let html = "";
        [...history].reverse().forEach(e => { html += `<tr><td>${e.end}</td><td>${e.sA || '-'}</td><td>${e.sB || '-'}</td></tr>`; });
        document.getElementById('card-body').innerHTML = html;
    }

    function finishMatch() {
        document.getElementById('signature-section').style.display = 'block';
        if (!padA) {
            padA = new SignaturePad(document.getElementById('sig-a'));
            padB = new SignaturePad(document.getElementById('sig-b'));
        }
    }

    async function sharePDF() {
        const element = document.querySelector('.app-container');
        document.getElementById('winner-pop').style.display = 'none';
        
        const opt = { 
            margin: [10, 5, 10, 5], 
            filename: 'Official_Scorecard.pdf', 
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 3, useCORS: true, scrollY: -window.scrollY }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        };
        
        try {
            const blob = await html2pdf().set(opt).from(element).output('blob');
            const file = new File([blob], 'Scorecard.pdf', { type: 'application/pdf' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Signed Scorecard' });
            } else { html2pdf().set(opt).from(element).save(); }
        } catch (e) { console.error(e); }
    }

    function toggleTimer() {
        if (!timerRunning) {
            timerInterval = setInterval(() => {
                timeLeft--;
                let h = Math.floor(timeLeft/3600), m = Math.floor((timeLeft%3600)/60), s = timeLeft%60;
                document.getElementById('display-time').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
            document.getElementById('timer-btn').innerText = "Pause";
        } else { clearInterval(timerInterval); document.getElementById('timer-btn').innerText = "Resume"; }
        timerRunning = !timerRunning;
    }
</script>
</body>
</html>
